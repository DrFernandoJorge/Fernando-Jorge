name: CI

# Anti-erro: nenhum código entra na branch principal sem passar por lint + tipos + testes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # A versão do pnpm vem do campo "packageManager" do package.json
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Typecheck (TypeScript estrito)
        run: pnpm typecheck

      - name: Testes
        run: pnpm test
